<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 flex items-center justify-center min-h-screen">

    <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 max-w-sm w-full text-center backdrop-blur-sm">
        
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-100">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
        </div>
        
        <h2 class="text-lg font-bold text-gray-800">¿Eliminar registro?</h2>
        <p class="text-sm text-gray-500 mt-2 mb-6">
            ¿Estás seguro de que deseas eliminar este registro de asistencia? Esta acción no se puede deshacer de forma automática.
        </p>
        
        <form method="POST" class="flex gap-3">
            {% csrf_token %}
            
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-xl shadow-md shadow-red-100 transition-all duration-150 transform active:scale-95 focus:outline-none">
                Sí, Eliminar
            </button>
            
            <a href="{% url 'asistencias:list' %}" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2.5 rounded-xl text-center transition-all duration-150 transform active:scale-95 block">
                Cancelar
            </a>
        </form>
    </div>

</body>
</html>
