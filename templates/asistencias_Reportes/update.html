<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos globales para dar diseño premium a lo que genera {{ form.as_p }} */
        form p {
            margin-bottom: 1.25rem;
        }
        form label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        form input, form select, form textarea {
            width: 100%;
            padding: 0.625rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            color: #374151;
            outline: none;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        form input:focus, form select:focus, form textarea:focus {
            border-color: transparent;
            border-width: 1px;
            box-shadow: 0 0 0 2px #4f46e5; /* Enfoque color índigo */
        }
    </style>
</head>
<body class="bg-gray-50 p-6 flex items-center justify-center min-h-screen">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 max-w-md w-full backdrop-blur-sm">
        
        <header class="mb-6">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Formulario de Asistencia</h1>
            <p class="text-xs text-gray-500 mt-1">Completá o modificá los datos del registro seleccionado.</p>
        </header>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="text-sm">
                {{ form.as_p }}
            </div>

            <div class="pt-4 flex gap-3 border-t border-gray-50">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl shadow-md shadow-indigo-100 transition-all duration-150 transform active:scale-95 focus:outline-none">
                    Guardar
                </button>
                
                <a href="{% url 'asistencias:list' %}" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2.5 rounded-xl text-center transition-all duration-150 transform active:scale-95 block">
                    Volver
                </a>
            </div>
        </form>

    </div>

</body>
</html>
